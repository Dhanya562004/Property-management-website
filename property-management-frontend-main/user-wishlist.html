<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - PropManager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800">

    <!-- Navbar -->
    <header class="glass-panel sticky top-0 z-40 w-full border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="user-dashboard.html" class="flex items-center gap-2">
                <span class="text-2xl">🏡</span>
                <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">PropManager</span>
            </a>
            
            <nav class="hidden md:flex items-center gap-6 font-bold text-slate-500 text-sm">
                <a href="user-dashboard.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Home</a>
                <a href="user-categories.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Categories</a>
                <a href="user-properties.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Find Homes</a>
                <a href="user-wishlist.html" class="text-blue-600 px-3 py-2 rounded-xl bg-blue-50">Wishlist</a>
                <a href="user-bookings.html" class="hover:text-blue-600 px-3 py-2 transition-colors">My Bookings</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="logout()" class="text-xs font-bold text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100/50 px-4 py-2.5 rounded-xl transition-all">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow py-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex flex-col gap-8">
        <div class="flex items-center justify-between">
            <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">Saved Properties</h2>
            <div id="loading-spinner" class="spinner hidden"></div>
        </div>

        <div id="wishlist-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamically loaded -->
            <div class="col-span-full py-12 text-center text-slate-400 font-bold">Loading your wishlist...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-400 py-8 border-t border-slate-800 text-center text-xs mt-auto">
        <p>&copy; 2026 PropManager. All rights reserved.</p>
    </footer>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>
    <script>
        if (guardPage([ROLE_CUSTOMER])) {
            document.addEventListener('DOMContentLoaded', () => {
                fetchWishlist();
            });
        }

        async function fetchWishlist() {
            const grid = document.getElementById('wishlist-grid');
            const spinner = document.getElementById('loading-spinner');
            
            spinner.classList.remove('hidden');
            grid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400 font-bold">Loading your wishlist...</div>';

            try {
                const res = await fetchApi('/api/user/my/wishlists');
                if (res && res.responseCode === 200) {
                    grid.innerHTML = '';
                    const wishlist = res.responseData;

                    if (wishlist.length === 0) {
                        grid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400 font-bold">Your wishlist is empty. Save some properties first!</div>';
                        return;
                    }

                    wishlist.forEach(w => {
                        const p = w.propertyInfo;
                        const card = document.createElement('div');
                        card.className = 'bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col justify-between hover-scale relative';
                        card.innerHTML = `
                            <div class="h-44 bg-slate-100 relative overflow-hidden">
                                <img src="${p.images[0] || 'https://via.placeholder.com/400x255?text=Property'}" alt="${p.property_name}" class="w-full h-full object-cover">
                            </div>
                            <div class="p-6 flex flex-col gap-3">
                                <h3 class="font-extrabold text-xl text-slate-900">${p.property_name}</h3>
                                <p class="text-slate-500 text-sm font-semibold">${p.locality}, ${p.city}</p>
                                
                                <div class="grid grid-cols-2 gap-2 mt-4 border-t border-slate-100 pt-4">
                                    <a href="user-property-detail.html?id=${p._id}" class="bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold text-xs py-2.5 rounded-xl transition-all text-center border border-blue-100">
                                        View details
                                    </a>
                                    <button onclick="removeFromWishlist('${w._id}')" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold text-xs py-2.5 rounded-xl transition-all border border-red-100">
                                        Remove
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                console.error(err);
            } finally {
                spinner.classList.add('hidden');
            }
        }

        async function removeFromWishlist(wishlistId) {
            if (!confirm('Are you sure you want to remove this property from your saved wishlist?')) {
                return;
            }

            try {
                const res = await fetchApi(`/api/user/wishlist/remove/${wishlistId}`, {
                    method: 'DELETE'
                });

                if (res && res.responseCode === 200) {
                    showToast('Property removed from wishlist.');
                    fetchWishlist();
                } else {
                    showToast(res ? res.responseMessage : 'Removal failed.', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
