<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - PropManager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 flex min-h-screen text-slate-800">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col justify-between border-r border-slate-800">
        <div class="flex flex-col">
            <div class="h-16 flex items-center px-6 gap-2 border-b border-slate-800">
                <span class="text-xl">🏡</span>
                <span class="font-extrabold text-white text-lg tracking-tight">PropManager</span>
            </div>
            
            <nav class="flex flex-col gap-1 p-4">
                <a href="admin-dashboard.html" class="hover:bg-slate-800 hover:text-white flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                    <span>📊</span> Dashboard
                </a>
                <a href="admin-vendors.html" class="hover:bg-slate-800 hover:text-white flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                    <span>👥</span> Vendor Requests
                </a>
                <a href="admin-categories.html" class="hover:bg-slate-800 hover:text-white flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                    <span>🏷️</span> Categories
                </a>
                <a href="admin-properties.html" class="nav-link-active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all">
                    <span>🏢</span> Properties
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-800 flex flex-col gap-2">
            <div class="px-4 py-2 flex flex-col">
                <span id="user-name" class="font-bold text-white text-sm">Admin System</span>
                <span class="text-xs text-slate-500">Administrator</span>
            </div>
            <button onclick="logout()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold text-sm py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                <span>🚪</span> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col min-h-screen">
        <!-- Top Bar -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
            <h2 class="text-xl font-extrabold text-slate-900 tracking-tight">Global Listings</h2>
            <div id="loading-spinner" class="spinner hidden"></div>
        </header>

        <main class="flex-grow p-8">
            <div id="properties-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loaded dynamically -->
                <div class="col-span-full py-12 text-center text-slate-400 font-bold">Loading properties...</div>
            </div>
        </main>
    </div>

    <!-- Property Details Modal with Admin Comment Post -->
    <div id="details-modal" class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto border border-slate-200 shadow-2xl p-8 flex flex-col gap-6 transform scale-95 transition-all">
            <div class="flex items-start justify-between border-b border-slate-100 pb-4">
                <div class="flex flex-col gap-1">
                    <h3 id="prop-title" class="text-2xl font-extrabold text-slate-950">Property Details</h3>
                    <p id="prop-subtitle" class="text-slate-400 text-xs font-semibold uppercase tracking-wider"></p>
                </div>
                <button onclick="closeDetailsModal()" class="text-slate-400 hover:text-slate-600 font-extrabold text-xl">×</button>
            </div>

            <!-- Details Container -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 text-sm">
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Price</span>
                    <span id="prop-price" class="font-extrabold text-slate-900"></span>
                </div>
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Deposit</span>
                    <span id="prop-deposit" class="font-bold text-slate-700"></span>
                </div>
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Local</span>
                    <span id="prop-location" class="font-bold text-slate-700"></span>
                </div>
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Status</span>
                    <span id="prop-status" class="font-bold text-slate-700"></span>
                </div>
            </div>

            <!-- Posted Remarks Section -->
            <div class="flex flex-col gap-4">
                <h4 class="font-extrabold text-lg text-slate-800">Admin Remarks & Vendor Replies</h4>
                <div id="comments-list" class="flex flex-col gap-3 max-h-48 overflow-y-auto pr-2">
                    <!-- Loaded dynamically -->
                </div>

                <!-- Add Comment Form -->
                <form id="comment-form" class="flex gap-3 border-t border-slate-100 pt-4 mt-2">
                    <input type="hidden" id="comment-prop-id">
                    <input type="text" id="comment-text-input" required placeholder="Write a warning/remark about this listing..." class="flex-grow px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm">
                    <button type="submit" class="gradient-primary text-sm font-bold text-white px-5 py-3 rounded-xl hover:scale-[1.01] active:scale-95 transition-all">
                        Post Remark
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>
    <script>
        if (guardPage([ROLE_ADMIN])) {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('user-name').innerText = user.name;
            }

            document.addEventListener('DOMContentLoaded', () => {
                fetchProperties();
            });
        }

        async function fetchProperties() {
            const grid = document.getElementById('properties-grid');
            const spinner = document.getElementById('loading-spinner');
            
            spinner.classList.remove('hidden');
            grid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400 font-bold">Loading properties...</div>';

            try {
                // To get all active properties, we can call search filter with empty values
                const res = await fetchApi('/api/properties/seach/filter?property_name=&city=&locality=');
                if (res && res.responseCode === 200) {
                    grid.innerHTML = '';
                    const properties = res.responseData;

                    if (properties.length === 0) {
                        grid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400 font-bold">No property listings found.</div>';
                        return;
                    }

                    properties.forEach(p => {
                        let statusText = '';
                        let statusColor = '';

                        if (p.prop_status === 1) { statusText = 'Ready'; statusColor = 'bg-green-100 text-green-700'; }
                        else if (p.prop_status === 2) { statusText = 'Upcoming'; statusColor = 'bg-amber-100 text-amber-700'; }
                        else if (p.prop_status === 3) { statusText = 'Sold'; statusColor = 'bg-slate-100 text-slate-700'; }
                        else if (p.prop_status === 4) { statusText = 'Rented'; statusColor = 'bg-blue-100 text-blue-700'; }

                        const card = document.createElement('div');
                        card.className = 'bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col justify-between hover-scale';
                        card.innerHTML = `
                            <div class="h-44 bg-slate-100 relative overflow-hidden">
                                <img src="${p.images[0] || 'https://via.placeholder.com/400x250?text=Property'}" alt="${p.property_name}" class="w-full h-full object-cover">
                                <span class="absolute top-3 right-3 ${statusColor} px-2.5 py-1 rounded-lg text-xs font-extrabold shadow-sm">${statusText}</span>
                            </div>
                            <div class="p-6 flex flex-col gap-3">
                                <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">${p.categoryInfo?.name || 'Category'} &bull; ${p.subcategoryInfo?.name || 'Subcategory'}</span>
                                <h3 class="font-extrabold text-xl text-slate-900">${p.property_name}</h3>
                                <p class="text-slate-500 text-sm font-semibold">${p.locality}, ${p.city}</p>
                                
                                <div class="flex items-center justify-between text-xs text-slate-400 font-bold border-t border-slate-100 pt-3 mt-1">
                                    <span>Listed by: ${p.listedby?.name || 'Vendor'}</span>
                                    <span class="text-slate-900 text-sm font-extrabold">${formatCurrency(p.price)}</span>
                                </div>
                                <button onclick="openDetailsModal('${p._id}')" class="w-full bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold text-xs py-2.5 rounded-xl transition-all border border-slate-200 mt-2">
                                    Review Remarks &amp; QA
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                console.error(err);
            } finally {
                spinner.classList.add('hidden');
            }
        }

        async function openDetailsModal(id) {
            try {
                // Fetch particular details
                const res = await fetchApi(`/api/properties/manage/list/particular?property_id=${id}`);
                if (res && res.responseCode === 200 && res.responseData.length > 0) {
                    const p = res.responseData[0];
                    
                    document.getElementById('comment-prop-id').value = p._id;
                    document.getElementById('prop-title').innerText = p.property_name;
                    document.getElementById('prop-subtitle').innerText = `${p.categoryInfo?.name} / ${p.subcategoryInfo?.name}`;
                    document.getElementById('prop-price').innerText = formatCurrency(p.price);
                    document.getElementById('prop-deposit').innerText = formatCurrency(p.deposit);
                    document.getElementById('prop-location').innerText = `${p.locality}, ${p.city}`;
                    
                    let statusText = 'Ready';
                    if (p.prop_status === 2) statusText = 'Upcoming';
                    if (p.prop_status === 3) statusText = 'Sold';
                    if (p.prop_status === 4) statusText = 'Rented';
                    document.getElementById('prop-status').innerText = statusText;

                    fetchComments(p._id);

                    document.getElementById('details-modal').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function closeDetailsModal() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        async function fetchComments(propId) {
            const list = document.getElementById('comments-list');
            list.innerHTML = '<p class="text-xs text-slate-400 italic">Loading remarks...</p>';

            try {
                const res = await fetchApi(`/api/comments/manage/list?property_id=${propId}`);
                if (res && res.responseCode === 200) {
                    list.innerHTML = '';
                    const comments = res.responseData;

                    if (comments.length === 0) {
                        list.innerHTML = '<p class="text-xs text-slate-400 italic">No admin remarks posted yet.</p>';
                        return;
                    }

                    comments.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'flex flex-col gap-1.5 p-3 bg-red-50/50 rounded-xl border border-red-100 text-sm';
                        
                        let replyHtml = '';
                        if (c.replies && c.replies.length > 0) {
                            replyHtml = c.replies.map(r => `
                                <div class="ml-4 mt-2 pl-3 border-l-2 border-slate-200 text-xs text-slate-600 flex flex-col gap-0.5">
                                    <span class="font-bold text-slate-800">Vendor Reply:</span>
                                    <span>${r.replycmt}</span>
                                </div>
                            `).join('');
                        }

                        div.innerHTML = `
                            <div class="flex flex-col gap-0.5">
                                <span class="text-xs font-bold text-red-600">Admin Remark:</span>
                                <span class="font-medium text-slate-800">${c.comment}</span>
                            </div>
                            ${replyHtml}
                        `;
                        list.appendChild(div);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const property_id = document.getElementById('comment-prop-id').value;
            const comment = document.getElementById('comment-text-input').value.trim();

            if (!comment) return;

            try {
                const res = await fetchApi('/api/comments/manage/post', {
                    method: 'POST',
                    body: JSON.stringify({ comment, property_id })
                });

                if (res && res.responseCode === 200) {
                    showToast('Remark posted successfully!');
                    document.getElementById('comment-text-input').value = '';
                    fetchComments(property_id);
                } else {
                    showToast(res ? res.responseMessage : 'Failed to post remark.', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
