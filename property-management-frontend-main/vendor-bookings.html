<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries / Bookings - PropManager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 flex min-h-screen text-slate-800">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col justify-between border-r border-slate-800">
        <div class="flex flex-col">
            <div class="h-16 flex items-center px-6 gap-2 border-b border-slate-800">
                <span class="text-xl">🏡</span>
                <span class="font-extrabold text-white text-lg tracking-tight">PropManager</span>
            </div>
            
            <nav class="flex flex-col gap-1 p-4">
                <a href="vendor-dashboard.html" class="hover:bg-slate-800 hover:text-white flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all">
                    <span>🏢</span> My Properties
                </a>
                <a href="vendor-bookings.html" class="nav-link-active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all">
                    <span>📅</span> Inquiries / Bookings
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-800 flex flex-col gap-2">
            <div class="px-4 py-2 flex flex-col">
                <span id="user-name" class="font-bold text-white text-sm">Landlord</span>
                <span class="text-xs text-slate-500">Property Vendor</span>
            </div>
            <button onclick="logout()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold text-sm py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                <span>🚪</span> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col min-h-screen">
        <!-- Top Bar -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
            <h2 class="text-xl font-extrabold text-slate-900 tracking-tight">Incoming Bookings</h2>
            <div id="loading-spinner" class="spinner hidden"></div>
        </header>

        <main class="flex-grow p-8">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-400 uppercase tracking-wider">
                            <th class="px-6 py-4">Property</th>
                            <th class="px-6 py-4">Price</th>
                            <th class="px-6 py-4">Seeker Info</th>
                            <th class="px-6 py-4">Booked On</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-table-body" class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                        <!-- Loaded dynamically -->
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-slate-400">Loading bookings...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>
    <script>
        if (guardPage([ROLE_VENDOR])) {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('user-name').innerText = user.name;
            }

            document.addEventListener('DOMContentLoaded', () => {
                fetchBookings();
            });
        }

        async function fetchBookings() {
            const tbody = document.getElementById('bookings-table-body');
            const spinner = document.getElementById('loading-spinner');
            
            spinner.classList.remove('hidden');
            tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">Loading bookings...</td></tr>`;

            try {
                const res = await fetchApi('/api/property/bookings/list');
                if (res && res.responseCode === 200) {
                    tbody.innerHTML = '';
                    const bookings = res.responseData;

                    if (bookings.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400 font-bold">No bookings placed on your properties yet.</td></tr>`;
                        return;
                    }

                    bookings.forEach(b => {
                        let statusBadge = '';
                        let actionBtn = '';

                        if (b.isaccepted === 0) {
                            statusBadge = `<span class="bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full text-xs font-bold">Pending Approval</span>`;
                            actionBtn = `
                                <button onclick="acceptBooking('${b.id}')" class="px-4 py-2 rounded-xl text-xs font-bold text-white bg-green-600 hover:bg-green-700 shadow-md shadow-green-500/10 hover:shadow-green-500/20 active:scale-95 transition-all">Accept Booking</button>
                            `;
                        } else {
                            statusBadge = `<span class="bg-green-100 text-green-700 px-2.5 py-1 rounded-full text-xs font-bold">Accepted</span>`;
                            actionBtn = `<span class="text-xs text-slate-400">Approved</span>`;
                        }

                        const tr = document.createElement('tr');
                        tr.className = 'hover:bg-slate-50 transition-colors';
                        tr.innerHTML = `
                            <td class="px-6 py-4 font-bold text-slate-900">${b.propertyInfo?.property_name || 'Property'}</td>
                            <td class="px-6 py-4 font-extrabold text-slate-950">${formatCurrency(b.propertyInfo?.price)}</td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-800">${b.accountInfo?.name}</span>
                                    <span class="text-xs text-slate-400">${b.accountInfo?.email} &bull; ${b.accountInfo?.phone}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-slate-500">${b.booked_on}</td>
                            <td class="px-6 py-4">${statusBadge}</td>
                            <td class="px-6 py-4 text-right">${actionBtn}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error(err);
            } finally {
                spinner.classList.add('hidden');
            }
        }

        async function acceptBooking(id) {
            if (!confirm('Are you sure you want to accept this booking request? This will notify the customer via email.')) {
                return;
            }

            try {
                const res = await fetchApi(`/api/property/bookings/accept/${id}`, {
                    method: 'PUT'
                });

                if (res && res.responseCode === 200) {
                    showToast('Booking accepted successfully! Email notification dispatched.');
                    fetchBookings();
                } else {
                    showToast(res ? res.responseMessage : 'Operation failed', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
