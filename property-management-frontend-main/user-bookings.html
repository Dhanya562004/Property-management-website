<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - PropManager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800">

    <!-- Navbar -->
    <header class="glass-panel sticky top-0 z-40 w-full border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="user-dashboard.html" class="flex items-center gap-2">
                <span class="text-2xl">🏡</span>
                <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">PropManager</span>
            </a>
            
            <nav class="hidden md:flex items-center gap-6 font-bold text-slate-500 text-sm">
                <a href="user-dashboard.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Home</a>
                <a href="user-categories.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Categories</a>
                <a href="user-properties.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Find Homes</a>
                <a href="user-wishlist.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Wishlist</a>
                <a href="user-bookings.html" class="text-blue-600 px-3 py-2 rounded-xl bg-blue-50">My Bookings</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="logout()" class="text-xs font-bold text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100/50 px-4 py-2.5 rounded-xl transition-all">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow py-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex flex-col gap-8">
        <div class="flex items-center justify-between">
            <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight font-heading">My Booking History</h2>
            <div id="loading-spinner" class="spinner hidden"></div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-400 uppercase tracking-wider">
                        <th class="px-6 py-4">Property</th>
                        <th class="px-6 py-4">Price</th>
                        <th class="px-6 py-4">Landlord Info</th>
                        <th class="px-6 py-4">Booked On</th>
                        <th class="px-6 py-4 text-right">Booking Status</th>
                    </tr>
                </thead>
                <tbody id="bookings-table-body" class="divide-y divide-slate-100 text-sm font-medium text-slate-700">
                    <!-- Dynamically loaded -->
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-slate-400">Loading your bookings...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-400 py-8 border-t border-slate-800 text-center text-xs mt-auto">
        <p>&copy; 2026 PropManager. All rights reserved.</p>
    </footer>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>
    <script>
        if (guardPage([ROLE_CUSTOMER])) {
            document.addEventListener('DOMContentLoaded', () => {
                fetchMyBookings();
            });
        }

        async function fetchMyBookings() {
            const tbody = document.getElementById('bookings-table-body');
            const spinner = document.getElementById('loading-spinner');
            
            spinner.classList.remove('hidden');
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">Loading your bookings...</td></tr>`;

            try {
                const res = await fetchApi('/api/property/bookings/list');
                if (res && res.responseCode === 200) {
                    tbody.innerHTML = '';
                    const bookings = res.responseData;

                    if (bookings.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 font-bold">You have not booked any properties yet.</td></tr>`;
                        return;
                    }

                    bookings.forEach(b => {
                        let statusBadge = '';
                        if (b.isaccepted === 0) {
                            statusBadge = `<span class="bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full text-xs font-bold">Pending Confirmation</span>`;
                        } else if (b.isaccepted === 1) {
                            statusBadge = `<span class="bg-green-100 text-green-700 px-2.5 py-1 rounded-full text-xs font-bold">Accepted</span>`;
                        } else {
                            statusBadge = `<span class="bg-red-100 text-red-700 px-2.5 py-1 rounded-full text-xs font-bold">Rejected</span>`;
                        }

                        const tr = document.createElement('tr');
                        tr.className = 'hover:bg-slate-50 transition-colors';
                        tr.innerHTML = `
                            <td class="px-6 py-4 font-bold text-slate-900">
                                <a href="user-property-detail.html?id=${b.propertyInfo?.property_id}" class="hover:underline hover:text-blue-600">
                                    ${b.propertyInfo?.property_name || 'Property'}
                                </a>
                            </td>
                            <td class="px-6 py-4 font-extrabold text-slate-950">${formatCurrency(b.propertyInfo?.price)}</td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-800">${b.accountInfo?.name || 'Vendor'}</span>
                                    <span class="text-xs text-slate-400">${b.accountInfo?.email || ''} &bull; ${b.accountInfo?.phone || ''}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-slate-500">${b.booked_on}</td>
                            <td class="px-6 py-4 text-right">${statusBadge}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error(err);
            } finally {
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
