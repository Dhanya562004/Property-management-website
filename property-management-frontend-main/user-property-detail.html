<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details - PropManager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800">

    <!-- Navbar -->
    <header class="glass-panel sticky top-0 z-40 w-full border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="user-dashboard.html" class="flex items-center gap-2">
                <span class="text-2xl">🏡</span>
                <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">PropManager</span>
            </a>
            
            <nav class="hidden md:flex items-center gap-6 font-bold text-slate-500 text-sm">
                <a href="user-dashboard.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Home</a>
                <a href="user-categories.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Categories</a>
                <a href="user-properties.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Find Homes</a>
                <a href="user-wishlist.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Wishlist</a>
                <a href="user-bookings.html" class="hover:text-blue-600 px-3 py-2 transition-colors">My Bookings</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="logout()" class="text-xs font-bold text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100/50 px-4 py-2.5 rounded-xl transition-all">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow py-10 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex flex-col gap-8">
        <div id="loading-spinner" class="spinner mx-auto my-12"></div>

        <div id="property-detail-container" class="hidden flex flex-col gap-8">
            <!-- Header Title -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex flex-col gap-2">
                    <span id="prop-cat" class="text-xs font-bold text-blue-600 uppercase tracking-wider"></span>
                    <h1 id="prop-name" class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight"></h1>
                    <p id="prop-location" class="text-slate-500 text-sm font-semibold"></p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="addToWishlist()" class="px-5 py-3 rounded-xl border border-slate-200 hover:bg-slate-100 text-slate-700 font-bold text-sm transition-all flex items-center gap-2">
                        <span>❤️</span> Wishlist
                    </button>
                    <button id="book-button" onclick="bookProperty()" class="gradient-primary px-7 py-3 rounded-xl text-white font-bold shadow-lg shadow-blue-500/25 hover:scale-[1.02] active:scale-95 transition-all text-sm">
                        Book Property
                    </button>
                </div>
            </div>

            <!-- Image Track -->
            <div id="images-track" class="grid grid-cols-1 md:grid-cols-2 gap-4 h-64 sm:h-96 rounded-2xl overflow-hidden shadow-md">
                <!-- Main and side images dynamic injection -->
            </div>

            <!-- Layout Grid -->
            <div class="grid md:grid-cols-3 gap-8">
                <!-- Specifications -->
                <div class="md:col-span-2 flex flex-col gap-6 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                    <h3 class="font-extrabold text-xl text-slate-900">Key Specifications</h3>
                    
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-6 text-sm">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Bedrooms</span>
                            <span id="prop-beds" class="font-extrabold text-slate-900"></span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Balconies</span>
                            <span id="prop-balconies" class="font-extrabold text-slate-900"></span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Bathrooms</span>
                            <span id="prop-baths" class="font-extrabold text-slate-900"></span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Flooring</span>
                            <span id="prop-flooring" class="font-extrabold text-slate-900"></span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Lift</span>
                            <span id="prop-lift" class="font-extrabold text-slate-900"></span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Parking</span>
                            <span id="prop-parking" class="font-extrabold text-slate-900"></span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Age</span>
                            <span id="prop-age" class="font-extrabold text-slate-900"></span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-wider block">Monthly Pay</span>
                            <span id="prop-paymonth" class="font-extrabold text-slate-900"></span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 mt-4 border-t border-slate-100 pt-6">
                        <h4 class="font-extrabold text-lg text-slate-800">Description</h4>
                        <p id="prop-description" class="text-slate-500 text-sm leading-relaxed"></p>
                    </div>
                </div>

                <!-- Price and Vendor Box -->
                <div class="flex flex-col gap-6">
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-4">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Pricing details</span>
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-slate-400">Total Price</span>
                            <span id="prop-price-tag" class="text-3xl font-extrabold text-slate-950"></span>
                        </div>
                        <div class="flex flex-col border-t border-slate-100 pt-3">
                            <span class="text-xs font-bold text-slate-400">Security Deposit</span>
                            <span id="prop-deposit-tag" class="text-lg font-bold text-slate-700"></span>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-3">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block border-b border-slate-100 pb-2">Listed by Vendor</span>
                        <div class="flex flex-col">
                            <span id="vendor-name" class="font-extrabold text-slate-900"></span>
                            <span id="vendor-email" class="text-xs text-slate-500"></span>
                            <span id="vendor-phone" class="text-xs text-slate-500"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Q&A and Remarks -->
            <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-6">
                <h3 class="font-extrabold text-xl text-slate-900">Remarks &amp; Verifications</h3>
                <div id="remarks-list" class="flex flex-col gap-4">
                    <!-- Remarks dynamically loaded -->
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-400 py-8 border-t border-slate-800 text-center text-xs mt-auto">
        <p>&copy; 2026 PropManager. All rights reserved.</p>
    </footer>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>
    <script>
        let propertyId = '';

        if (guardPage([ROLE_CUSTOMER])) {
            document.addEventListener('DOMContentLoaded', () => {
                const urlParams = new URLSearchParams(window.location.search);
                propertyId = urlParams.get('id');

                if (propertyId) {
                    fetchDetails();
                } else {
                    showToast('Invalid property reference.', 'error');
                    setTimeout(() => { window.location.href = 'user-dashboard.html'; }, 1000);
                }
            });
        }

        async function fetchDetails() {
            const spinner = document.getElementById('loading-spinner');
            const container = document.getElementById('property-detail-container');

            try {
                const res = await fetchApi(`/api/properties/manage/list/particular?property_id=${propertyId}`);
                if (res && res.responseCode === 200 && res.responseData.length > 0) {
                    const p = res.responseData[0];

                    document.getElementById('prop-cat').innerText = `${p.categoryInfo?.name} / ${p.subcategoryInfo?.name}`;
                    document.getElementById('prop-name').innerText = p.property_name;
                    document.getElementById('prop-location').innerText = `${p.locality}, ${p.city}`;
                    document.getElementById('prop-price-tag').innerText = formatCurrency(p.price);
                    document.getElementById('prop-deposit-tag').innerText = formatCurrency(p.deposit);
                    document.getElementById('prop-beds').innerText = p.bedrooms;
                    document.getElementById('prop-balconies').innerText = p.balconies;
                    document.getElementById('prop-baths').innerText = p.bathrooms;
                    document.getElementById('prop-flooring').innerText = p.flooring;
                    document.getElementById('prop-age').innerText = p.age;
                    document.getElementById('prop-lift').innerText = p.lift === 1 ? 'Yes' : 'No';
                    document.getElementById('prop-parking').innerText = p.parking === 1 ? 'Yes' : 'No';
                    document.getElementById('prop-paymonth').innerText = p.pay_on_month === 1 ? 'Yes' : 'No';
                    document.getElementById('prop-description').innerText = p.description || 'No description provided.';
                    
                    document.getElementById('vendor-name').innerText = p.listedby?.name || 'Vendor';
                    document.getElementById('vendor-email').innerText = p.listedby?.email || '';
                    document.getElementById('vendor-phone').innerText = p.listedby?.phoen || ''; // handles phoen typo mapping in database details

                    // Book button enable/disable
                    const bookBtn = document.getElementById('book-button');
                    if (p.prop_status !== 1) { // 1 = READY_TO_BUY
                        bookBtn.innerText = 'Not Available to Book';
                        bookBtn.disabled = true;
                        bookBtn.className = 'bg-slate-200 text-slate-400 px-7 py-3 rounded-xl font-bold text-sm cursor-not-allowed';
                    }

                    // Render images track
                    const imgTrack = document.getElementById('images-track');
                    imgTrack.innerHTML = '';
                    
                    if (p.images.length === 1) {
                        imgTrack.innerHTML = `<img src="${p.images[0]}" class="w-full h-full object-cover col-span-full">`;
                    } else if (p.images.length > 1) {
                        imgTrack.innerHTML = `
                            <img src="${p.images[0]}" class="w-full h-full object-cover">
                            <div class="grid grid-cols-2 gap-2 h-full">
                                ${p.images.slice(1, 5).map(img => `<img src="${img}" class="w-full h-full object-cover">`).join('')}
                            </div>
                        `;
                    } else {
                        imgTrack.innerHTML = `<img src="https://via.placeholder.com/600x300?text=No+Images" class="w-full h-full object-cover col-span-full">`;
                    }

                    fetchRemarks();

                    spinner.classList.add('hidden');
                    container.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchRemarks() {
            const container = document.getElementById('remarks-list');
            container.innerHTML = '<p class="text-xs text-slate-400 italic">Loading remarks...</p>';

            try {
                const res = await fetchApi(`/api/comments/manage/list?property_id=${propertyId}`);
                if (res && res.responseCode === 200) {
                    container.innerHTML = '';
                    const comments = res.responseData;

                    if (comments.length === 0) {
                        container.innerHTML = '<p class="text-xs text-slate-400 italic">No warnings/remarks have been posted on this listing.</p>';
                        return;
                    }

                    comments.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'flex flex-col gap-2 p-4 bg-slate-50 rounded-2xl border border-slate-200 text-sm';
                        
                        let repliesHtml = '';
                        if (c.replies && c.replies.length > 0) {
                            repliesHtml = c.replies.map(r => `
                                <div class="ml-6 mt-3 pl-4 border-l-2 border-slate-300 text-xs text-slate-600">
                                    <span class="font-bold text-slate-900 block mb-0.5">Vendor Reply:</span>
                                    <span>${r.replycmt}</span>
                                </div>
                            `).join('');
                        }

                        div.innerHTML = `
                            <div class="flex flex-col gap-1">
                                <span class="text-xs font-bold text-red-600">Platform Administrator Remark:</span>
                                <span class="font-semibold text-slate-800">${c.comment}</span>
                            </div>
                            ${repliesHtml}
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function addToWishlist() {
            try {
                const res = await fetchApi('/api/user/wishlist/add', {
                    method: 'POST',
                    body: JSON.stringify({ property_id: propertyId })
                });

                if (res && res.responseCode === 200) {
                    showToast('Property saved to your Wishlist!');
                } else {
                    showToast(res ? res.responseMessage : 'Failed to save property.', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function bookProperty() {
            if (!confirm('Are you sure you want to request a booking inquiry for this property?')) {
                return;
            }

            try {
                const res = await fetchApi('/api/property/bookings/add', {
                    method: 'POST',
                    body: JSON.stringify({ property_id: propertyId })
                });

                if (res && res.responseCode === 200) {
                    showToast('Booking request placed successfully! Vendor has been notified.');
                    setTimeout(() => { window.location.href = 'user-bookings.html'; }, 1000);
                } else {
                    showToast(res ? res.responseMessage : 'Booking request failed.', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
