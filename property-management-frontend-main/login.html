<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PropManager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-xl p-8 flex flex-col gap-6 relative overflow-hidden">
        
        <!-- Decorative subtle blue blob -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl transform translate-x-12 -translate-y-12"></div>
        
        <div class="flex flex-col gap-2 relative z-10">
            <a href="index.html" class="flex items-center gap-2 mb-2 w-fit">
                <span class="text-xl">🏡</span>
                <span class="font-extrabold text-lg tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">PropManager</span>
            </a>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
            <p class="text-slate-500 text-sm">Enter your credentials to access your dashboard</p>
        </div>

        <form id="login-form" class="flex flex-col gap-4 relative z-10">
            <div class="flex flex-col gap-1.5">
                <label for="username" class="text-xs font-bold text-slate-700 uppercase tracking-wider">Email or Phone</label>
                <input type="text" id="username" required placeholder="e.g. admin@property.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all text-slate-800 text-sm">
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="password" class="text-xs font-bold text-slate-700 uppercase tracking-wider">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all text-slate-800 text-sm">
            </div>

            <button type="submit" class="gradient-primary text-sm font-bold text-white py-3.5 rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 hover:scale-[1.01] active:scale-95 transition-all mt-2 flex items-center justify-center gap-2">
                <span>Sign In</span>
                <span id="loader" class="hidden animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
            </button>
        </form>

        <div class="border-t border-slate-100 pt-6 text-center text-xs text-slate-500 relative z-10 flex flex-col gap-2">
            <p>Don't have an account?</p>
            <div class="flex items-center justify-center gap-4 font-bold text-blue-600">
                <a href="register-user.html" class="hover:underline">Register Seeker</a>
                <span class="text-slate-300">|</span>
                <a href="register-vendor.html" class="hover:underline">Register Vendor</a>
            </div>
        </div>
    </div>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loader = document.getElementById('loader');

            loader.classList.remove('hidden');

            try {
                const res = await fetchApi('/api/account/signin', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                if (res) {
                    if (res.responseCode === 200) {
                        showToast('Login successful!');
                        setAuth(res.responseData.access_token, res.responseData.role);
                        
                        // Redirect by role: 1=Admin, 2=Vendor, 3=Customer
                        const role = parseInt(res.responseData.role);
                        setTimeout(() => {
                            if (role === ROLE_ADMIN) {
                                window.location.href = 'admin-dashboard.html';
                            } else if (role === ROLE_VENDOR) {
                                window.location.href = 'vendor-dashboard.html';
                            } else {
                                window.location.href = 'user-dashboard.html';
                            }
                        }, 800);
                    } else {
                        showToast(res.responseMessage, 'error');
                    }
                }
            } catch (err) {
                console.error(err);
            } finally {
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
