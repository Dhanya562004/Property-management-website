<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - PropManager</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800">

    <!-- Navbar -->
    <header class="glass-panel sticky top-0 z-40 w-full border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="user-dashboard.html" class="flex items-center gap-2">
                <span class="text-2xl">🏡</span>
                <span class="font-extrabold text-xl tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">PropManager</span>
            </a>
            
            <nav class="hidden md:flex items-center gap-6 font-bold text-slate-500 text-sm">
                <a href="user-dashboard.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Home</a>
                <a href="user-categories.html" class="text-blue-600 px-3 py-2 rounded-xl bg-blue-50">Categories</a>
                <a href="user-properties.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Find Homes</a>
                <a href="user-wishlist.html" class="hover:text-blue-600 px-3 py-2 transition-colors">Wishlist</a>
                <a href="user-bookings.html" class="hover:text-blue-600 px-3 py-2 transition-colors">My Bookings</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="logout()" class="text-xs font-bold text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100/50 px-4 py-2.5 rounded-xl transition-all">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow py-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-8">Browse by Categories</h2>
        
        <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full py-12 text-center text-slate-400 font-bold">Loading Categories...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-slate-400 py-8 border-t border-slate-800 text-center text-xs mt-auto">
        <p>&copy; 2026 PropManager. All rights reserved.</p>
    </footer>

    <!-- App JS -->
    <script src="assets/js/app.js"></script>
    <script>
        if (guardPage([ROLE_CUSTOMER])) {
            document.addEventListener('DOMContentLoaded', () => {
                fetchCategories();
            });
        }

        async function fetchCategories() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400 font-bold">Loading Categories...</div>';

            try {
                const res = await fetchApi('/api/category/manage/list');
                if (res && res.responseCode === 200) {
                    grid.innerHTML = '';
                    const categories = res.responseData;

                    if (categories.length === 0) {
                        grid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400 font-bold">No categories found.</div>';
                        return;
                    }

                    for (let c of categories) {
                        const card = document.createElement('div');
                        card.className = 'bg-white p-8 rounded-3xl border border-slate-200 shadow-sm flex flex-col gap-6 hover-scale';
                        
                        let subcatHtml = '<p class="text-xs text-slate-400 italic">No subcategories listed.</p>';
                        try {
                            const subres = await fetchApi(`/api/subcategory/manage/list?category_id=${c.id}`);
                            if (subres && subres.responseCode === 200 && subres.responseData.length > 0) {
                                const subcategories = subres.responseData[0].subCategories;
                                if (subcategories.length > 0) {
                                    subcatHtml = `
                                        <div class="grid grid-cols-2 gap-3 mt-2">
                                            ${subcategories.map(sc => `
                                                <a href="user-properties.html?category_id=${c.id}&subcategory_id=${sc._id}" class="bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-700 p-3 rounded-2xl text-sm font-semibold border border-slate-100 hover:border-blue-100 text-center transition-all">
                                                    ${sc.name}
                                                </a>
                                            `).join('')}
                                        </div>
                                    `;
                                }
                            }
                        } catch (err) {
                            console.error(err);
                        }

                        card.innerHTML = `
                            <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                                <h3 class="font-extrabold text-2xl text-slate-900">${c.name}</h3>
                                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Browse Subcategories</span>
                            </div>
                            ${subcatHtml}
                        `;
                        grid.appendChild(card);
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
